name: Refresh contribution run

on:
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contribution-snake-output
  cancel-in-progress: false

jobs:
  generate:
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate light and dark neon snakes
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/contribution-snake.svg?color_snake=#39F6D2&color_dots=#EEEAFB,#B7F7EC,#65E9D2,#39CDB5,#FF4FD8
            dist/contribution-snake-dark.svg?palette=github-dark&color_snake=#FF4FD8&color_dots=#0D0A20,#173A46,#1A766F,#39F6D2,#4FFFE1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate generated files
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          output = Path("dist")
          expected = {"contribution-snake.svg", "contribution-snake-dark.svg"}
          assert set(path.name for path in output.iterdir()) == expected
          for path in output.iterdir():
              assert ET.parse(path).getroot().tag == "{http://www.w3.org/2000/svg}svg"
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: contribution-snake
          path: |-
            dist/contribution-snake.svg
            dist/contribution-snake-dark.svg
          if-no-files-found: error

  publish:
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: contribution-snake
          path: dist
      - name: Publish output branch
        run: |
          mkdir -p /tmp/snake-output
          cp dist/contribution-snake.svg dist/contribution-snake-dark.svg /tmp/snake-output/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan output
          git rm -rf --ignore-unmatch .
          cp /tmp/snake-output/contribution-snake.svg .
          cp /tmp/snake-output/contribution-snake-dark.svg .
          git add contribution-snake.svg contribution-snake-dark.svg
          git commit -m "chore: refresh contribution run"
          git push --force origin output
