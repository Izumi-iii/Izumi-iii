name: Refresh profile cards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-profile-main
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: pytest
      - run: python scripts/validate_readme.py README.md

  generate:
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Generate validated SVG cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_profile.py --output-dir dist/profile-cards
      - name: Validate generated card set
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          output = Path("dist/profile-cards")
          expected = {"languages.svg", "last-sync.svg", "profile-stats.svg", "projects.svg"}
          assert set(path.name for path in output.iterdir()) == expected
          for path in output.iterdir():
              assert ET.parse(path).getroot().tag == "{http://www.w3.org/2000/svg}svg"
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: profile-cards
          path: dist/profile-cards
          if-no-files-found: error

  publish:
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: profile-cards
          path: .profile-cards-staged
      - name: Publish changed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf assets/generated
          mv .profile-cards-staged assets/generated
          git add assets/generated
          if git diff --cached --quiet; then
            echo "Profile cards are already current"
          else
            git commit -m "chore: refresh profile cards"
            git push origin HEAD:main
          fi
